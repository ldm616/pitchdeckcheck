[build]
  base = "app"
  command = "npm run build"
  publish = "dist"
  functions = "../netlify/functions"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["busboy", "@napi-rs/canvas", "@supabase/supabase-js", "pdfjs-dist"]

[functions."extract-slides"]
  node_bundler = "none"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
